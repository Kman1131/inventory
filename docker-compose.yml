services:
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3000
      API_KEY: ${API_KEY:-inventory-secret-key}
      DB_PATH: /data/inventory.db
    ports:
      - '${BACKEND_HOST_PORT:-3000}:3000'
    volumes:
      - inventory-data:/data
    restart: unless-stopped

  web:
    build:
      context: ./web
    ports:
      - '${WEB_HOST_PORT:-8080}:80'
    depends_on:
      - backend
    restart: unless-stopped

  mobile:
    build:
      context: ./mobile
    environment:
      EXPO_NO_TELEMETRY: '1'
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      CHOKIDAR_USEPOLLING: '1'
      REACT_NATIVE_PACKAGER_HOSTNAME: ${LAN_IP}
    command: npx expo start --host lan --port 8081
    ports:
      - '8081:8081'
      - '19000:19000'
      - '19001:19001'
      - '19002:19002'
    volumes:
      - ./mobile:/app
      - mobile-node-modules:/app/node_modules
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  inventory-data:
  mobile-node-modules: